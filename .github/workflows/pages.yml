name: Deploy Playwright Report

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  report:
    name: Run full suite & publish Playwright report
    runs-on: ubuntu-latest
    timeout-minutes: 90
    services:
      testflow:
        image: qaschool/testflow:latest
        ports:
          - 5050:5050
        options: >-
          --health-interval 15s
          --health-timeout 10s
          --health-retries 6
          --health-start-period 90s
    steps:
      - name: Checkout test suite
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium firefox webkit --with-deps

      - name: Verify TestFlow is reachable
        continue-on-error: true
        run: curl -sf http://localhost:5050/health && echo "TestFlow OK" || echo "TestFlow not reachable"

      - name: Run Playwright full suite
        run: npm test
        continue-on-error: true

      - name: Generate Allure report
        if: always()
        run: npm run report:allure
        continue-on-error: true

      - name: Build GitHub Pages site
        run: npm run pages:build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: playwright-report-pages
          path: |
            allure-report/
            allure-results/
            playwright-report/
            site/report/
          if-no-files-found: ignore

  deploy:
    name: Deploy to GitHub Pages
    needs: report
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
