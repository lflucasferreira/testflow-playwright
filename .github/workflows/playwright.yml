name: Playwright E2E

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  setup:
    name: Install dependencies
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout test suite
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20

      - name: Cache node_modules
        id: cache-tests
        uses: actions/cache@v5
        with:
          path: node_modules
          key: pw-tests-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.cache-tests.outputs.cache-hit != 'true'
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium firefox webkit --with-deps

  test:
    name: Playwright — ${{ matrix.suite }}
    runs-on: ubuntu-latest
    needs: setup
    timeout-minutes: 15
    services:
      testflow:
        image: qaschool/testflow:latest
        ports:
          - 5050:5050
        options: >-
          --health-interval 15s
          --health-timeout 10s
          --health-retries 6
          --health-start-period 90s
    strategy:
      fail-fast: false
      matrix:
        suite: [api, smoke, smoke-firefox, smoke-webkit, auth, dashboard, team, settings, components, wizard, activity, advanced, states, layout, widgets, a11y, visual]
    steps:
      - name: Checkout test suite
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20

      - name: Restore node_modules
        uses: actions/cache@v5
        with:
          path: node_modules
          key: pw-tests-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        run: |
          case "${{ matrix.suite }}" in
            smoke-firefox) npx playwright install firefox --with-deps ;;
            smoke-webkit) npx playwright install webkit --with-deps ;;
            *) npx playwright install chromium --with-deps ;;
          esac

      - name: Verify TestFlow is reachable
        continue-on-error: true
        run: curl -sf http://localhost:5050/health && echo "TestFlow OK" || echo "TestFlow not reachable"

      - name: Run Playwright — ${{ matrix.suite }}
        run: npm run test:${{ matrix.suite }}

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: playwright-report-${{ matrix.suite }}
          path: playwright-report/
          if-no-files-found: ignore

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: allure-results-${{ matrix.suite }}
          path: allure-results/
          if-no-files-found: ignore

      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: test-results-${{ matrix.suite }}
          path: test-results/
          if-no-files-found: ignore

  smoke-grep:
    name: Playwright — @smoke tag
    runs-on: ubuntu-latest
    needs: setup
    timeout-minutes: 10
    services:
      testflow:
        image: qaschool/testflow:latest
        ports:
          - 5050:5050
        options: >-
          --health-interval 15s
          --health-timeout 10s
          --health-retries 6
          --health-start-period 90s
    steps:
      - name: Checkout test suite
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20

      - name: Restore node_modules
        uses: actions/cache@v5
        with:
          path: node_modules
          key: pw-tests-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run @smoke tagged tests
        run: npm run test:grep:smoke

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: playwright-report-smoke-grep
          path: playwright-report/
          if-no-files-found: ignore

  report:
    name: Publish combined report
    runs-on: ubuntu-latest
    needs: [test, smoke-grep]
    if: always()
    timeout-minutes: 5
    steps:
      - name: Download all reports
        uses: actions/download-artifact@v7
        with:
          pattern: playwright-report-*
          merge-multiple: true
          path: combined-report
        continue-on-error: true

      - name: Upload combined report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: playwright-report
          path: combined-report/
          if-no-files-found: ignore
