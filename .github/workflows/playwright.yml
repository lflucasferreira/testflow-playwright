name: Playwright E2E

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  setup:
    name: Install dependencies
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout test suite
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Cache node_modules
        id: cache-tests
        uses: actions/cache@v5
        with:
          path: node_modules
          key: pw-tests-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.cache-tests.outputs.cache-hit != 'true'
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium firefox webkit --with-deps

  test:
    name: Playwright — ${{ matrix.suite }}
    runs-on: ubuntu-latest
    needs: setup
    timeout-minutes: ${{ contains(fromJSON('["smoke-webkit","smoke-firefox","widgets","visual","advanced"]'), matrix.suite) && 35 || 20 }}
    services:
      testflow:
        image: qaschool/testflow:latest
        ports:
          - 5050:5050
        options: >-
          --health-interval 15s
          --health-timeout 10s
          --health-retries 6
          --health-start-period 90s
    strategy:
      fail-fast: false
      matrix:
        suite: [api, smoke, smoke-firefox, smoke-webkit, auth, dashboard, team, settings, components, wizard, activity, advanced, states, layout, widgets, a11y, visual]
    steps:
      - name: Checkout test suite
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Restore node_modules
        uses: actions/cache@v5
        with:
          path: node_modules
          key: pw-tests-${{ hashFiles('package-lock.json') }}

      - name: Resolve Playwright browser
        id: pw-browser
        run: |
          case "${{ matrix.suite }}" in
            smoke-firefox) browser=firefox ;;
            smoke-webkit) browser=webkit ;;
            *) browser=chromium ;;
          esac
          echo "name=${browser}" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: ms-playwright-${{ steps.pw-browser.outputs.name }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        run: |
          case "${{ matrix.suite }}" in
            smoke-firefox) npx playwright install firefox --with-deps ;;
            smoke-webkit) npx playwright install webkit --with-deps ;;
            *) npx playwright install chromium --with-deps ;;
          esac

      - name: Verify TestFlow is reachable
        continue-on-error: true
        run: curl -sf http://localhost:5050/health && echo "TestFlow OK" || echo "TestFlow not reachable"

      - name: Run Playwright — ${{ matrix.suite }}
        run: npm run test:${{ matrix.suite }}

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: playwright-report-${{ matrix.suite }}
          path: playwright-report/
          if-no-files-found: ignore

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: allure-results-${{ matrix.suite }}
          path: allure-results/
          if-no-files-found: ignore

      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: test-results-${{ matrix.suite }}
          path: test-results/
          if-no-files-found: ignore

  smoke-grep:
    name: Playwright — @smoke tag
    runs-on: ubuntu-latest
    needs: setup
    timeout-minutes: 10
    services:
      testflow:
        image: qaschool/testflow:latest
        ports:
          - 5050:5050
        options: >-
          --health-interval 15s
          --health-timeout 10s
          --health-retries 6
          --health-start-period 90s
    steps:
      - name: Checkout test suite
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Restore node_modules
        uses: actions/cache@v5
        with:
          path: node_modules
          key: pw-tests-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run @smoke tagged tests
        run: npm run test:grep:smoke

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: playwright-report-smoke-grep
          path: playwright-report/
          if-no-files-found: ignore

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: allure-results-smoke-grep
          path: allure-results/
          if-no-files-found: ignore

  publish:
    name: Build Allure report & publish GitHub Pages
    runs-on: ubuntu-latest
    needs: [test, smoke-grep]
    if: always() && github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 15
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - name: Checkout test suite
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci

      - name: Download Allure results
        uses: actions/download-artifact@v7
        with:
          pattern: allure-results-*
          merge-multiple: true
          path: allure-results
        continue-on-error: true

      - name: Generate Allure report
        run: npm run report:allure
        continue-on-error: true

      - name: Build GitHub Pages site
        run: npm run pages:build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: site

      - name: Upload Allure report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: allure-report-pages
          path: |
            allure-report/
            allure-results/
            site/report/
          if-no-files-found: ignore

  deploy:
    name: Deploy to GitHub Pages
    needs: publish
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
